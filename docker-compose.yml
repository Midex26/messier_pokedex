services:
  dev:
    profiles: ["dev"]
    build:
      context: .
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true

  prod:
    profiles: ["prod"]
    build:
      context: .
      target: prod
    ports:
      - "8080:80"
    restart: unless-stopped
